<section style="margin-bottom:16px">
  <h2>Log T+0 Trade</h2>
  <form hx-post="/t0-trades" hx-target="#t0-table" hx-swap="innerHTML">
    <div class="form-row">
      <div class="form-group">
        <label>Sell Price</label>
        <input type="number" name="sell_price" step="0.01" min="0" placeholder="62.50" required>
      </div>
      <div class="form-group">
        <label>Buyback Price</label>
        <input type="number" name="buy_price" step="0.01" min="0" placeholder="60.00" required>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" step="100" min="1" placeholder="200" required>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </div>
  </form>
</section>
